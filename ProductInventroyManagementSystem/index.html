<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Inventory Log In Page</title>
    <link rel="stylesheet" href="bootstrap-5.3.8-dist/css/bootstrap.min.css">
    <style>
        body {
            font-family: 'Inter', -apple-system, sans-serif;
        }

        .login-card {
            background: rgba(71, 84, 104, 0.7) !important;
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            width: 100%;
            max-width: 450px;
            padding: 20px;
        }

        h3 {
            color: #ffffff !important;
            font-weight: 700;
            letter-spacing: -1px;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.3);
        }

        .form-label {
            color: rgb(255, 255, 255) !important;
            font-size: 0.85rem;
            margin-bottom: 4px;
            font-weight: 500 !important;
        }

        .login-card .form-control:invalid:not(:placeholder-shown),
        .login-card .form-control.is-invalid,
        .login-card .form-select.is-invalid {
            border-bottom: 1px solid #ff4d4d !important;
        }

        .login-card .form-control.is-invalid:focus,
        .login-card .form-select.is-invalid:focus {
            border-bottom: 1px solid #ff4d4d !important;
            box-shadow: 0 1px 0 0 #ff4d4d !important;
        }

        .login-card .form-control.is-invalid::placeholder {
            color: rgba(255, 77, 77, 0.6);
        }

        .form-control,
        .form-select {
            background-color: transparent !important;
            border: none;
            border-bottom: 1px solid rgba(255, 255, 255, 0.2) !important;
            border-radius: 0;
            color: #ffffff;
            padding-left: 0;
            transition: all 0.3s ease;
        }

        .form-control::placeholder {
            color: rgba(255, 255, 255, 0.515);
        }

        .form-control:focus,
        .form-select:focus {
            box-shadow: none;
            border-bottom: 1px solid #6366f1;
        }


        .form-select option {
            background-color: #181d25;
            color: white;
        }

        #btn-log-in {
            background: linear-gradient(135deg, #4f46e5 0%, #3730a3 100%);
            border: none;
            border-radius: 8px;
            padding: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 20px;
            box-shadow: 0 4px 15px rgba(79, 70, 229, 0.4);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        #btn-log-in:hover {
            transform: translateY(-2px);
        }
    </style>

</head>

<body>


    <div id="myDiv" class="container vh-100 d-flex justify-content-center align-items-center">
        <div class="card shadow-lg login-card">
            <div class="card-body p-4">

                <h3 class="text-center mb-4" style="font-size: 40px;">Product Inventory System</h3>

                <form>

                    <!-- Email -->
                    <div class="mb-3">
                        <label class="form-label" style="font-weight: bold; color: rgb(60, 60, 60);">Email
                            address</label>
                        <input type="email" class="form-control" id="txt-email" placeholder="Enter email">
                    </div>

                    <!-- Password -->
                    <div class="mb-3">
                        <label class="form-label" style="font-weight: bold; color: rgb(60, 60, 60);">Password</label>
                        <input type="password" class="form-control " id="txt-password" placeholder="Enter password">
                    </div>

                    <!-- Role Selection -->
                    <div class="mb-3">
                        <label class="form-label" style="font-weight: bold; color: rgb(60, 60, 60);">Login As</label>
                        <select class="form-select" id="select-role">
                            <option value="Admin">Admin</option>
                            <option value="Supplier">Supplier</option>
                            <option value="Staff">Staff</option>
                        </select>
                    </div>

                    <!-- Login Button -->
                    <div class="d-grid">
                        <button type="submit" class="btn btn-primary" id="btn-log-in">Login</button>
                    </div>

                </form>

            </div>
        </div>
    </div>

    <script src="/Class/User.js"></script>
    <script src="jquery.js"></script>
    <script src="bootstrap-5.3.8-dist/js/bootstrap.bundle.min.js"></script>
    <script src="LogIn.js"></script>
</body>

</html>
